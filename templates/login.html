<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Amplifier Panel</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .login-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0c1110;
        }

        .login-card {
            width: min(90%, 380px);
            background: #101816;
            border: 1px solid #20352d;
            border-radius: 10px;
            padding: 32px;
        }

        .login-card h1 {
            font-size: 22px;
            margin-bottom: 4px;
        }

        .login-card p.subtitle {
            color: #9fb2aa;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .login-card .form-field {
            margin-bottom: 16px;
        }

        .login-card button {
            width: 100%;
            padding: 10px;
            background: rgb(0, 106, 60);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 650;
            font-size: 15px;
        }

        .login-card button:hover {
            background: #087a49;
        }

        .login-error {
            background: rgba(255, 100, 100, 0.12);
            border: 1px solid rgba(255, 100, 100, 0.4);
            color: #ff8f8f;
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div class="login-wrap">
        <div class="login-card">
            <h1>Amplifier Panel</h1>
            <p class="subtitle">Zaloguj się, aby otworzyć panel sterowania.</p>

            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}

            <form method="post" action="/login">
                <div class="form-field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" autocomplete="username" required autofocus>
                </div>
                <div class="form-field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" required>
                </div>
                <button type="submit">Zaloguj</button>
            </form>
        </div>
    </div>
</body>

</html>
